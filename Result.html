<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻雀 AI牌譜添削ツール - 解析結果</title>
    <style>
        /* 💡 将来の複数局面対応を見据えたレイアウト（Grid / Flexbox）の定義 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* 将来用のサイドバー（MVPでは非表示）
           将来的にはここに「1局目」「2局目」のリストが入るスペースを確保 */
        .sidebar-space {
            display: none; /* 👈 将来全出力対応するときはここを flex に変更 */
            width: 200px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }

        .main-content {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 640px;
            box-sizing: border-box;
        }

        /* 局面ヘッダー */
        .header-area {
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .episode-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin: 0;
        }

        /* 手牌表示エリア */
        .tiles-area {
            background-color: #e8f4f8;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #2980b9;
        }

        /* 打牌比較（実打牌 vs 推奨打牌） */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .comparison-box {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .box-user {
            background-color: #fdf2f2;
            border: 1px solid #f9d5d5;
        }
        .box-ai {
            background-color: #f2fbf5;
            border: 1px solid #d5f5e3;
        }
        .box-label {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        .tile-name {
            font-size: 24px;
            font-weight: bold;
        }
        .box-user .tile-name { color: #c0392b; }
        .box-ai .tile-name { color: #27ae60; }

        /* q_value 期待値差分 */
        .q-value-badge {
            background-color: #e67e22;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* LLM解説エリア */
        .commentary-area {
            background-color: #f9f9f9;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin-bottom: 30px;
            text-align: left;
            line-height: 1.6;
        }

        /* ノーミス（完璧な対局）時のお祝いスタイル */
        .perfect-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .perfect-title {
            font-size: 24px;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .perfect-badge {
            font-size: 50px;
            margin-bottom: 20px;
        }

        /* ボタン類 */
        .btn-back {
            display: inline-block;
            width: 100%;
            max-width: 240px;
            padding: 12px;
            background-color: #7f8c8d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #95a5a6;
        }

        /* デモ切り替え用スイッチ（画面最上部に固定） */
        .demo-switcher {
            margin-bottom: 20px;
            background: #e2e8f0;
            padding: 10px;
            border-radius: 8px;
        }
        .demo-switcher button {
            margin: 0 5px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- 将来用のサイドバースペース（CSSで現在は非表示、全出力時に活用） -->
<div class="sidebar-space">
    <h3>指摘局面一覧</h3>
    <p>#1 東1局 5巡目</p>
</div>

<div class="main-content">
    <!-- デモ状態切り替えスイッチ -->
    <div class="demo-switcher">
        <span>【デモ用状態切替】: </span>
        <button onclick="toggleState('review')">添削ありパターン(MVP)</button>
        <button onclick="toggleState('perfect')">ノーミスお祝いパターン</button>
    </div>

    <!-- メインのコンテナ -->
    <div class="container">
        
        <!-- 1. 通常の添削表示エリア -->
        <div id="reviewResult">
            <div class="header-area">
                <div class="episode-title" id="episodeTitle">東1局 0本場 5巡目</div>
            </div>

            <!-- 手牌表示（MVPはテキスト。いつでも画像に差し替え可能な枠として定義） -->
            <div class="tiles-area" id="tilesView">
                手牌: [一萬][二萬][三萬][四索][五索][六索][一筒][二筒][三筒][北][北][発][中][中]
            </div>

            <div class="comparison-grid">
                <div class="comparison-box box-user">
                    <div class="box-label">あなたの打牌</div>
                    <div class="tile-name" id="userPlay">[北]</div>
                </div>
                <div class="comparison-box box-ai">
                    <div class="box-label">AIの推奨打牌</div>
                    <div class="tile-name" id="aiPlay">[発]</div>
                </div>
            </div>

            <div class="q-value-badge" id="qValueLoss">期待値ロス: -0.12</div>

            <div class="commentary-area" id="aiCommentary">
                <strong>💡 AIからのアドバイス：</strong><br>
                ここではオタ風の[北]を残すよりも、役牌である[発]を残す方が、重なった際の打点・スピード共に有利になります。特に他家からの早いリーチに対抗するためにも、役牌の価値を高く見積もりましょう。
            </div>
        </div>

        <!-- 2. ノーミス（完璧な対局）時の特殊表示エリア（初期非表示） -->
        <div id="perfectResult" class="perfect-message">
            <div class="perfect-badge">👑✨🀄✨👑</div>
            <div class="perfect-title">素晴らしい！完璧な対局でした！</div>
            <p style="color: #7f8c8d;">AIの最適解とあなたの打牌が完全に一致しています。</p>
        </div>

        <!-- トップに戻るボタン（常に最下部に配置） -->
        <button class="btn-back" onclick="goToTop()">トップに戻る</button>

    </div>
</div>

<script>
    // 💡 状態（ステート）を切り替えるためのシンプルなUI制御関数
    function toggleState(state) {
        const reviewResult = document.getElementById('reviewResult');
        const perfectResult = document.getElementById('perfectResult');

        if (state === 'review') {
            reviewResult.style.display = 'block';
            perfectResult.style.display = 'none';
        } else if (state === 'perfect') {
            reviewResult.style.display = 'none';
            perfectResult.style.display = 'block';
        }
    }

    // トップに戻るアクション
    function goToTop() {
        alert("入力画面（トップ）へ戻ります。");
        // 本番ではここで `window.location.href = 'index.html'` などで画面遷移させます
    }
</script>

</body>
</html>
